services:
  - type: worker
    name: fitlex-vk-bot
    runtime: python
    region: frankfurt
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -u bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: VK_TOKEN
        sync: false
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
